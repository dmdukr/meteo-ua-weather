name: "Meteo UA Parser"
description: >-
  Погода з meteo.ua для Home Assistant.
  При першому запуску автоматично встановить інтеграцію Meteo UA Weather
  та карточку прогнозу погоди. Після встановлення потрібне перезавантаження HA.
  Перед видаленням аддону видаліть інтеграцію через Налаштування → Інтеграції.
  /
  Weather from meteo.ua for Home Assistant.
  On first start automatically installs Meteo UA Weather integration and
  forecast card. HA restart required after installation.
  Before removing the add-on, remove the integration via Settings → Integrations.
version: "0.13.0"
slug: "meteo_ua_parser"
url: "https://github.com/dmdukr/ha-addon-meteo-ua-parser"
arch:
  - amd64
  - aarch64
ports:
  5581/tcp: 5581
ports_description:
  5581/tcp: "HTTP API"
options:
  cities:
    - city_id: "34"
      city_slug: "kiev"
  log_level: "info"
schema:
  cities:
    - city_id: str
      city_slug: str
  log_level: list(debug|info|warning|error)
startup: "application"
boot: "auto"
init: false
map:
  - config:rw
homeassistant_api: true
hassio_role: "manager"
