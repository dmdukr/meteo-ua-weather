name: "Meteo UA Parser"
description: "Headless browser parser for meteo.ua — provides hourly, daily and current weather via local HTTP API"
version: "0.7.0"
slug: "meteo_ua_parser"
url: "https://github.com/dmdukr/ha-addon-meteo-ua-parser"
arch:
  - amd64
  - aarch64
ports:
  5581/tcp: 5581
ports_description:
  5581/tcp: "HTTP API"
options:
  cities:
    - city_id: "34"
      city_slug: "kiev"
  log_level: "info"
schema:
  cities:
    - city_id: str
      city_slug: str
  log_level: list(debug|info|warning|error)
startup: "application"
boot: "auto"
init: false
